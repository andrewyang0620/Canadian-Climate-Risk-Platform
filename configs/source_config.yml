sources:
  eccc_historical_climate:
    display_name: ECCC Historical Climate Data
    source_group: national
    provider: Environment and Climate Change Canada
    source_url: https://climate.weather.gc.ca/
    access_method: bulk_csv
    expected_frequency: periodic
    file_format: csv
    spatial_grain: station
    temporal_grain: daily
    time_window:
      start_year: 2016
      end_year: 2025
    target_bronze_table: bronze_climate
    target_silver_table: silver_climate_daily
    downstream_use:
      - weather_extreme_score
      - grid_month_hazard_exposure
    required_fields:
      - station_id
      - date
      - latitude
      - longitude
    climate_measurement_contract:
      required_measurements:
        - temperature
        - precipitation
      validation_rule: at_least_one_weather_measurement_present_after_silver_standardization
      downstream_standard_names:
        max_temperature: max_temp_c
        min_temperature: min_temp_c
        mean_temperature: mean_temp_c
        total_precipitation: total_precip_mm
      candidate_raw_fields:
        temperature:
          - MAX_TEMP
          - MIN_TEMP
          - MEAN_TEMP
          - max_temp
          - min_temp
          - mean_temp
        precipitation:
          - TOTAL_PRECIP
          - TOTAL_RAIN
          - TOTAL_SNOW
          - precip
          - precipitation
      note: >
        ECCC climate downloads may expose weather fields with different names across
        formats. Silver standardization must produce temperature and/or precipitation
        measurements required by weather extreme features.
    validation_checks:
      - schema_hash
      - row_count
      - coordinate_range
      - date_range
    post_silver_validation_checks:
      - climate_measurement_presence
      - temperature_reasonable_range
      - precipitation_non_negative
      - station_date_uniqueness
    redistribution: public

  eccc_hydrometric_realtime:
    display_name: ECCC Hydrometric Real-Time Data
    source_group: national
    provider: Water Survey of Canada
    source_url: https://wateroffice.ec.gc.ca/
    access_method: rest_api
    expected_frequency: daily
    file_format: json_or_csv
    spatial_grain: station
    temporal_grain: daily_or_subdaily
    time_window:
      start_year: 2026
      end_year: null
    target_bronze_table: bronze_hydrometric_realtime
    target_silver_table: silver_hydro_daily
    downstream_use:
      - flood_hydrometric_signal
      - daily_hazard_pipeline
    required_fields:
      - station_id
      - observed_at
      - latitude
      - longitude
    measurement_contract:
      required_measurements:
        - discharge
        - water_level
      validation_rule: at_least_one_measurement_present_after_silver_standardization
      downstream_standard_names:
        discharge: discharge_cms
        water_level: water_level_m
      note: >
        Real-time hydrometric data must produce at least one standardized water
        measurement after Silver processing. Raw API field names may differ, so this
        requirement is enforced after source-specific standardization.
    validation_checks:
      - schema_hash
      - row_count
      - coordinate_range
      - freshness
    post_silver_validation_checks:
      - hydrometric_measurement_presence
      - non_negative_discharge
      - station_timestamp_uniqueness
    redistribution: public

  hydat_archive:
    display_name: HYDAT Historical Hydrometric Archive
    source_group: national
    provider: Water Survey of Canada
    source_url: https://www.canada.ca/en/environment-climate-change/services/water-overview/quantity/monitoring/survey/data-products-services/national-archive-hydat.html
    access_method: bulk_sqlite
    expected_frequency: quarterly
    file_format: sqlite
    spatial_grain: station
    temporal_grain: daily
    time_window:
      start_year: 2016
      end_year: 2025
    target_bronze_table: bronze_hydat
    target_silver_table: silver_hydro_baseline
    downstream_use:
      - hydrometric_baseline
      - water_level_percentile
      - discharge_percentile
    required_fields:
      - station_id
      - date
    measurement_contract:
      required_measurements:
        - discharge
        - water_level
      validation_rule: at_least_one_measurement_present_after_silver_standardization
      downstream_standard_names:
        discharge: discharge_cms
        water_level: water_level_m
      note: >
        HYDAT is a structured archive rather than a single flat file. Raw field names
        may differ by table, so discharge and water-level requirements are enforced
        after Silver standardization rather than as direct Bronze field names.
    validation_checks:
      - schema_hash
      - row_count
      - date_range
    post_silver_validation_checks:
      - hydrometric_measurement_presence
      - non_negative_discharge
      - station_date_uniqueness
    redistribution: public

  wildfire_history:
    display_name: CWFIS / CNFDB Wildfire History
    source_group: national
    provider: Natural Resources Canada
    source_url: https://cwfis.cfs.nrcan.gc.ca/
    access_method: bulk_geojson_or_csv
    expected_frequency: seasonal
    file_format: geojson_or_csv
    spatial_grain: point
    temporal_grain: event
    time_window:
      start_year: 2016
      end_year: 2025
    target_bronze_table: bronze_wildfire
    target_silver_table: silver_wildfire_event
    downstream_use:
      - wildfire_exposure_score
      - wildfire_proximity_features
    required_fields:
      - event_id
      - latitude
      - longitude
      - event_date
    validation_checks:
      - schema_hash
      - row_count
      - coordinate_range
      - event_date_range
    post_silver_validation_checks:
      - geometry_constructed_from_coordinates
      - geometry_validity
      - crs_check
    redistribution: public

  statcan_building_permits:
    display_name: Statistics Canada Building Permits
    source_group: national
    provider: Statistics Canada
    source_url: https://www150.statcan.gc.ca/
    access_method: bulk_csv
    expected_frequency: monthly
    file_format: csv
    spatial_grain: municipality
    temporal_grain: monthly
    time_window:
      start_year: 2016
      end_year: null
    target_bronze_table: bronze_statcan_building_permits
    target_silver_table: silver_permit_monthly
    downstream_use:
      - development_exposure_score
      - municipality_month_priority
    required_fields:
      - municipality
      - period
      - permit_value
    municipality_mapping_contract:
      intended_join_target: census_boundaries
      intended_join_target_silver_table: silver_boundary_municipality
      join_required_for_downstream: true
      candidate_geography_fields:
        - municipality
        - geo
        - geo_code
        - csd_name
        - csd_uid
        - province
      validation_rule: at_least_one_municipality_identifier_present_after_silver_standardization
      downstream_standard_names:
        municipality_key: municipality_key
        municipality_name: municipality_name
        province: province
      note: >
        Statistics Canada building permit geography must be standardized to the
        municipality/CSD boundary table before municipality-month priority marts can
        be built.
    validation_checks:
      - schema_hash
      - row_count
      - non_negative_values
      - date_range
    post_silver_validation_checks:
      - municipality_identifier_presence
      - municipality_boundary_join_coverage
      - permit_value_non_negative
      - municipality_month_uniqueness
    redistribution: public

  census_boundaries:
    display_name: Census Province and Municipality Boundaries
    source_group: national
    provider: Statistics Canada
    source_url: https://www12.statcan.gc.ca/census-recensement/index-eng.cfm
    access_method: boundary_file_download
    expected_frequency: periodic
    file_format: shapefile_or_geojson
    spatial_grain: province_and_municipality_polygon
    temporal_grain: static_or_periodic
    time_window:
      start_year: null
      end_year: null
    target_bronze_table: bronze_boundaries
    target_silver_table: silver_boundary_municipality
    additional_silver_tables:
      - silver_boundary_province
    downstream_use:
      - province_filtering
      - province_grid_clipping
      - municipality_rollup
      - grid_to_municipality_map
      - validation_mapping
    required_fields:
      - geometry
    boundary_contract:
      required_boundary_outputs:
        - silver_boundary_province
        - silver_boundary_municipality
      required_standard_fields:
        silver_boundary_province:
          - province_key
          - province_name
          - geometry
        silver_boundary_municipality:
          - municipality_key
          - municipality_name
          - province
          - geometry
      validation_rule: both_province_and_municipality_boundaries_required_after_silver_standardization
      note: >
        The raw boundary download may contain multiple boundary layers or files.
        Bronze validation only requires geometry. Silver standardization must produce
        both province-level and municipality/CSD-level boundary tables with stable
        standard fields for grid clipping and municipality rollups.
    validation_checks:
      - schema_hash
      - row_count
      - geometry_validity
      - crs_check
    post_silver_validation_checks:
      - province_boundary_standard_fields
      - municipality_boundary_standard_fields
      - boundary_geometry_validity
      - boundary_crs_check
    redistribution: public

  canadian_disaster_database:
    display_name: Canadian Disaster Database
    source_group: national
    provider: Public Safety Canada
    source_url: https://www.publicsafety.gc.ca/cnt/rsrcs/cndn-dsstr-dtbs/index-en.aspx
    open_data_dataset_id: 1c3d15f9-9cfa-4010-8462-0d67e493d9b9
    open_data_api_url: https://open.canada.ca/data/api/action/package_show
    preferred_resource_formats:
      - CSV
      - XLSX
      - XLS
    access_method: spreadsheet_download
    expected_frequency: periodic
    file_format: xlsx_or_csv
    spatial_grain: municipality_or_region
    temporal_grain: event
    time_window:
      start_year: 2016
      end_year: 2025
    target_bronze_table: bronze_disaster_events
    target_silver_table: silver_disaster_event_month
    downstream_use:
      - score_validation
      - event_capture_at_top_k
      - lift_at_top_k
    required_fields:
      - event_id
      - event_date
      - province
    location_mapping_contract:
      required_for_downstream_validation: true
      minimum_geographic_grain: province_plus_location_text
      candidate_location_fields:
        - municipality
        - event_location
        - location
        - place
        - affected_area
        - geographic_area
      fallback_mapping_methods:
        - province_level_event_month
        - manual_location_lookup_table
        - text_to_municipality_standardization
      validation_rule: province_required_and_at_least_one_location_candidate_or_mapping_available
      note: >
        CDD event geography may be reported as municipality, region, affected area,
        or free-text location. Silver processing must preserve enough geographic
        information to support disaster-event mapping for score validation.
    validation_checks:
      - schema_hash
      - row_count
      - date_range
    post_silver_validation_checks:
      - disaster_location_candidate_presence
      - province_event_month_mapping
      - validation_event_geography_coverage
    redistribution: public

  vancouver_property_parcels:
    display_name: Vancouver Property Parcel Polygons
    source_group: municipal
    provider: City of Vancouver
    source_url: https://opendata.vancouver.ca/explore/dataset/property-parcel-polygons/
    access_method: open_data_api_or_download
    expected_frequency: periodic
    file_format: geojson
    spatial_grain: parcel_polygon
    temporal_grain: current_snapshot
    time_window:
      start_year: null
      end_year: null
    target_bronze_table: bronze_vancouver_property_parcels
    target_silver_table: silver_vancouver_parcel
    downstream_use:
      - vancouver_parcel_exposure
      - vancouver_parcel_flood_overlay
    required_fields:
      - geometry
    identity_contract:
      primary_entity: parcel
      stable_id_required: true
      candidate_id_fields:
        - parcel_id
        - pid
        - site_id
        - legal_description
      validation_rule: at_least_one_candidate_id_present
      note: >
        The parcel source must provide a stable parcel identity for downstream joins,
        but the exact raw field name should be confirmed during Silver profiling.
    validation_checks:
      - schema_hash
      - row_count
      - geometry_validity
      - crs_check
    post_silver_validation_checks:
      - parcel_identity_candidate_presence
      - parcel_geometry_validity
    redistribution: public
    portal_type: opendatasoft
    opendatasoft_base_url: https://opendata.vancouver.ca
    dataset_id: property-parcel-polygons
    preferred_export_format: geojson

  vancouver_property_tax:
    display_name: Vancouver Property Tax Report
    source_group: municipal
    provider: City of Vancouver
    source_url: https://opendata.vancouver.ca/explore/dataset/property-tax-report/
    access_method: open_data_api_or_download
    expected_frequency: annual
    file_format: csv
    spatial_grain: parcel_or_property
    temporal_grain: annual
    time_window:
      start_year: null
      end_year: null
    target_bronze_table: bronze_vancouver_property_tax
    target_silver_table: silver_vancouver_property_tax
    downstream_use:
      - vancouver_property_value_proxy
      - vancouver_parcel_exposure
    required_fields:
      - property_tax_year
      - total_value
    join_contract:
      intended_join_target: vancouver_property_parcels
      intended_join_target_silver_table: silver_vancouver_parcel
      join_required_for_downstream: true
      candidate_join_keys:
        - pid
        - parcel_id
        - legal_description
        - civic_address
        - folio
      validation_rule: at_least_one_candidate_key_present
      note: >
        The exact Vancouver property tax join key should be confirmed during Silver
        profiling. The contract records candidate keys instead of prematurely forcing
        a raw field name that may not exist in the source export.
    validation_checks:
      - schema_hash
      - row_count
      - non_negative_values
    post_silver_validation_checks:
      - join_key_candidate_presence
      - parcel_join_coverage
    redistribution: public
    portal_type: opendatasoft
    opendatasoft_base_url: https://opendata.vancouver.ca
    dataset_id: property-tax-report
    preferred_export_format: csv

  vancouver_building_permits:
