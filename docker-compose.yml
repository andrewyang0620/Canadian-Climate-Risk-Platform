services:
  postgres:
    image: postgres:16
    container_name: climate-risk-postgres
    environment:
      POSTGRES_USER: climate_user
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: climate_risk
    ports:
      - "5432:5432"
    volumes:
      - climate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climate_user -d climate_risk"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-postgres:
    image: postgres:16
    container_name: climate-risk-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.10.5-python3.11
    container_name: climate-risk-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: local_dev_secret_key
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: >
      bash -c "airflow db migrate &&
      (airflow users create
      --username admin
      --firstname Local
      --lastname Admin
      --role Admin
      --email admin@example.com
      --password admin || true)"

  airflow-webserver:
    image: apache/airflow:2.10.5-python3.11
    container_name: climate-risk-airflow-webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    ports:
      - "8081:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.5-python3.11
    container_name: climate-risk-airflow-scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: scheduler

  spark-master:
    image: apache/spark:3.5.5
    container_name: climate-risk-spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_HOST: spark-master
    ports:
      - "7077:7077"
      - "8080:8080"

  spark-worker:
    image: apache/spark:3.5.5
    container_name: climate-risk-spark-worker
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2

volumes:
  climate_postgres_data:
  airflow_postgres_data:
